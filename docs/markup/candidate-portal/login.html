<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Log In — TalentHub</title>
  <meta name="description" content="Log in to your TalentHub account to apply for jobs, track applications, and manage bookmarks.">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- ─── Header ─── -->
  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a href="job-listing.html" class="logo" aria-label="TalentHub home">
        <span class="logo-icon" aria-hidden="true">T</span>
        TalentHub
      </a>

      <nav class="main-nav" aria-label="Primary navigation">
        <a href="job-listing.html">Jobs</a>
        <a href="#">About Us</a>
        <a href="#">Culture</a>
        <a href="#">Contact</a>
      </nav>

      <div class="header-actions">
        <div class="text-resizer" role="group" aria-label="Text size">
          <button type="button" class="text-resizer-btn" data-resize="decrease" aria-label="Decrease text size">A&minus;</button>
          <button type="button" class="text-resizer-btn" data-resize="reset" aria-label="Reset text size">A</button>
          <button type="button" class="text-resizer-btn" data-resize="increase" aria-label="Increase text size">A+</button>
        </div>
        <a href="login.html" class="btn btn-ghost btn-sm" aria-current="page">Log In</a>
        <a href="#" class="btn btn-primary btn-sm">Register</a>
        <button class="mobile-menu-btn" aria-label="Open menu" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ─── Main Content ─── -->
  <main id="main-content">
    <div class="auth-wrapper">
      <div class="auth-card">

        <!-- Brand Mark -->
        <div class="auth-brand">
          <span class="logo-icon logo-icon--lg" aria-hidden="true">T</span>
        </div>

        <h1 id="auth-heading" class="auth-heading">Welcome back</h1>
        <p id="auth-desc" class="auth-subheading">Log in to your account to continue</p>

        <!-- OAuth Buttons -->
        <div class="auth-oauth" role="group" aria-label="Social login options">
          <button type="button" class="btn-oauth">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>

          <button type="button" class="btn-oauth">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="#0A66C2"/>
            </svg>
            Continue with LinkedIn
          </button>
        </div>

        <!-- Divider -->
        <div class="auth-divider" role="separator">
          <span>or sign in with email</span>
        </div>

        <!-- Login Form -->
        <form class="auth-form" action="#" method="post" novalidate aria-labelledby="auth-heading" aria-describedby="auth-desc">
          <div class="form-group">
            <label for="login-email" class="form-label">Email address</label>
            <div class="form-input-icon-wrap">
              <svg class="form-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M22 7l-10 7L2 7"/>
              </svg>
              <input
                type="email"
                id="login-email"
                name="email"
                class="form-input form-input--icon"
                placeholder="you@example.com"
                autocomplete="email"
                required
                aria-required="true"
              >
            </div>
          </div>

          <div class="form-group">
            <div class="form-label-row">
              <label for="login-password" class="form-label">Password</label>
              <a href="#" class="form-link">Forgot password?</a>
            </div>
            <div class="form-input-icon-wrap">
              <svg class="form-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                type="password"
                id="login-password"
                name="password"
                class="form-input form-input--icon"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
                aria-required="true"
              >
              <button type="button" class="password-toggle" aria-label="Show password" data-visible="false">
                <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group form-group--inline">
            <label class="form-checkbox">
              <input type="checkbox" name="remember" value="1">
              <span class="form-checkbox-mark" aria-hidden="true"></span>
              Remember me
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">
            Log In
          </button>
        </form>

        <!-- Sign-up Link -->
        <p class="auth-footer-text">
          Don't have an account? <a href="#" class="auth-footer-link">Create one now</a>
        </p>

      </div>
    </div>
  </main>

  <!-- ─── Footer ─── -->
  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <p>&copy; 2026 TalentHub. All rights reserved.</p>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Accessibility</a>
      </nav>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
